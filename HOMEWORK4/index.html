<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Практика по формам</title>
		<link rel="stylesheet" href="./css/styles.css" />
	</head>
	<body>
		<form class="form">
			<fieldset class="form-group">
				<legend class="form-group2">Ваши личные данные</legend>
				<label for="name" class="label">Ваше имя</label>
				<input
					id="name"
					class="input"
					type="text"
					placeholder="Имя"
					name="name"
					required
				/>
				<label for="age" class="label">Ваш возраст</label>
				<input
					id="age"
					class="input"
					type="number"
					placeholder="Возраст"
					inputmode="numeric"
					name="age"
					required
				/>
				<label for="phone" class="label">Ваш номер телефона</label>
				<input
					id="phone"
					class="input"
					type="tel"
					placeholder="Номер телефона"
					inputmode="tel"
					name="phone"
					required
				/>
				<label for="phone" class="label">Ваша почта</label>
				<input
					id="email"
					class="input"
					type="email"
					placeholder="Почта"
					inputmode="email"
					name="email	"
					required
				/>
			</fieldset>
			<fieldset class="form-group">
				<label for="message" class="label">Сообщение</label>
				<textarea
					id="message"
					class="textarea"
					required
					name="message"
					placeholder="Ваше сообщение"
				></textarea>
				<label class="label">
					<input class="checkbox" type="checkbox" name="checkbox" required />
					<span class="text2">Я принимаю правила</span>
				</label>
			</fieldset>
			<button class="button">Отправить</button>
		</form>
	</body>
</html>
